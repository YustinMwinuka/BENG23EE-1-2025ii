<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration</title>
    <style>
        body {
          font-family: Arial, sans-serif;
          margin: 2rem;
          background-color: #f9f9f9;
        }
        .container {
          max-width: 600px;
          margin: 0 auto;
          padding: 2rem;
          background: #fff;
          border-radius: 8px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h1 {
          text-align: center;
          margin-bottom: 1.5rem;
          color: #333;
        }
        form {
          display: flex;
          flex-direction: column;
        }
        label {
          margin-bottom: 0.5rem;
          font-weight: bold;
          color: #555;
        }
        input, textarea {
          padding: 0.5rem;
          margin-bottom: 1rem;
          border: 1px solid #ccc;
          border-radius: 4px;
          font-size: 1rem;
          transition: border-color 0.3s ease;
        }
        input:focus, textarea:focus {
          border-color: #007bff;
          outline: none;
        }
        button {
          padding: 0.75rem;
          font-size: 1rem;
          background-color: #007bff;
          color: #fff;
          border: none;
          border-radius: 4px;
          cursor: pointer;
          transition: background-color 0.2s ease;
          box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:hover {
          background-color: #0056b3;
        }
        table {
          width: 100%;
          border-collapse: collapse;
          margin-top: 2rem;
        }
        th, td {
          padding: 0.75rem;
          border: 1px solid #ddd;
          text-align: left;
        }
        th {
          background-color: #f2f2f2;
          color: #333;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Customer Registration</h1>
    <form action="/customers" method="post">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" required style="background-color: #f0f8ff;" /><label for="email">Email Address</label>
        <input type="email" id="email" name="email" required style="background-color: #f0f8ff;" />

        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone_number" placeholder='+1234567890' style="background-color: #f0f8ff;" />

        <label for="address">Address</label>
        <textarea id="address" name="address" rows="3" style="background-color: #f0f8ff;"></textarea>

        <label for="meter_number">Meter Number</label>
        <input type="text" id="meter_number" name="meter_number" required style="background-color: #f0f8ff;" />

        <label for="date">Date</label>
        <input type="date" id="date" name="date" required style="background-color: #f0f8ff;" />

        <button type="submit">Register</button>
    </form>

    <h2 style="margin-top: 2rem;">Registered Customers</h2>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Meter No.</th>
            <th>Date</th>

        </tr>
        </thead>
        <tbody>
        <tr>
            <td>1</td>
            <td>John Doe</td>
            <td>john@example.com</td>
            <td>+123456789</td>
            <td>123 Main St.</td>
            <td>MTR-001</td>
            <td>01/05/2025</td>

        </tr>
        </tbody>
    </table>

</div>
</body>
</html>
